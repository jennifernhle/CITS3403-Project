<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popcorn Journal - Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Popcorn Journal</a>
      <div>
        <a class="nav-link d-inline" href="index.html">Home</a>
        <a class="nav-link d-inline" href="movie-review.html">Movie Review</a>
        <a class="nav-link d-inline" href="profile.html">Profile</a>
      </div>
    </div>
  </nav>

  <!-- Reset Password Page -->
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h3 fw-bold mb-3 text-center">Reset Password</h1>
            <p class="text-muted text-center mb-4">
              Enter your email address and create a new password.
            </p>

            <form>
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
              </div>

              <div class="mb-3">
                <label for="new-password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="new-password" placeholder="Enter a new password">
              </div>

              <div class="mb-3">
                <label for="confirm-password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirm-password" placeholder="Re-enter your new password">
              </div>

              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary">Reset Password</button>
              </div>
              </p>
            </form>
          </div>
        </div>

        <div class="text-center mt-3">
          <a href="login.html" class="text-decoration-none">Back to Login</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
