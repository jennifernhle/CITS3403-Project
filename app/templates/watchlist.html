<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link

    />

    <link rel="stylesheet" href="../static/css/styles.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <header>
      <!-- Navigation -->
      <nav class="navbar navbar-expand-md shadow-sm" id="primary-nav">
        <div class="container">
          <a class="navbar-brand fw-bold" href="">Popcorn Journal</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse mt-2 mt-md-0" id="navbarContent">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a href="" class="nav-link">Home</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">Search</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link active">Watchlist</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">Profile</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">Logout</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container">
      <div class="row justify-content-md-center mt-4 px-3" id="watchlist">
        <h2 class="text-center fw-bold my-4" id="title">My Watchlist</h2>

        <div
          class="col-12 col-md-10 col-lg-9 col-xl-8 mt-2 px-3 p-4"
          id="watchlist-card"
        >
          <div class="mt-2">
            <h5 class="fw-bold mb-3">Saved Movies</h5>
            <div id="watchlist-results"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="custom-footer py-5 mt-5">
      <div class="container text-center">
        <div class="d-flex justify-content-center gap-3 mb-3">
          <a href="" class="text-decoration-none">About</a>
          <a href="" class="text-decoration-none">Contact</a>
          <a href="" class="text-decoration-none">Terms</a>
          <a href="" class="text-decoration-none">Privacy</a>
        </div>
        <p class="small text-secondary mb-0">&copy; Popcorn Journal</p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
