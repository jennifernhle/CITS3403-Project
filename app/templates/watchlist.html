<!--Watchlist page用来查看已添加和删除-->
<!--Watchlist page used to watch to movies which is added and removed-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Watchlist</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 统一CSS -->
    <!--Standardize css-->
    <link rel="stylesheet" href="../../static/css/styles.css">

    <style>
        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color);
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .card-img-top {
            height: 200px;
            object-fit: cover;
        }

        .nav-link {
            color: #333 !important;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        .nav-link.active {
            color: #0d6efd !important;
            font-weight: 500;
        }
    </style>
</head>

<body>

<!-- Navbar（统一） -->
<nav class="navbar navbar-expand-md shadow-sm bg-white">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Popcorn Journal</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="#">Search</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#">Watchlist</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Profile</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 主内容 -->
<!--Main content-->
<div class="container py-5">

  <!-- 标题 -->
  <!--title-->
  <div class="text-center mb-5">
    <h1 class="fw-bold">My Watchlist</h1>
    <p class="text-muted">Movies you plan to watch</p>
  </div>


  <!-- 卡片 -->
  <!--Cards-->
  <div class="row g-4">

    <!-- Card1 -->
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">

        <div class="card-body">
          <h5 class="card-title">Inception</h5>
          <p class="card-text text-muted">Sci-Fi • 2010</p>

          <p class="text-warning mb-2">⭐ <strong>8.8</strong></p>

          <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-danger btn-sm">Remove</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Card2 -->
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">

        <div class="card-body">
          <h5 class="card-title">Interstellar</h5>
          <p class="card-text text-muted">Sci-Fi • 2014</p>

          <p class="text-warning mb-2">⭐ <strong>8.6</strong></p>

          <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-danger btn-sm">Remove</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Card3 -->
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">

        <div class="card-body">
          <h5 class="card-title">The Dark Knight</h5>
          <p class="card-text text-muted">Action • 2008</p>

          <p class="text-warning mb-2">⭐ <strong>9.0</strong></p>

          <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-danger btn-sm">Remove</button>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
