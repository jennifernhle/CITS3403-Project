{% extends "base.html" %} {% block title %}Watchlist - Popcorn Journal{%
endblock %} {% block content %}

<div class="container">
  <h2 class="text-center fw-bold my-4" id="title">My Watchlist</h2>
  <p class="text-secondary text-center">Movies you are planning to watch.</p>

  <div class="row g-4">
    <div class="col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm border-0">
        <img
          src="https://picsum.photos/300/200"
          class="card-img-top"
          alt="Inception"
        />
        <div class="card-body">
          <h5 class="card-title fw-bold">Inception</h5>
          <p class="card-text text-muted small">Sci-Fi • 2010</p>
          <p class="text-warning mb-3">
            <i class="bi bi-star-fill"></i> <strong>8.8</strong>
          </p>
          <div class="d-flex justify-content-between">
            <a
              href="{{ url_for('main.review') }}"
              class="btn btn-outline-primary btn-sm px-3"
              >View</a
            >
            <button class="btn btn-danger btn-sm px-3">
              <i class="bi bi-trash"></i> Remove
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm border-0">
        <img
          src="https://picsum.photos/300/200"
          class="card-img-top"
          alt="Interstellar"
        />
        <div class="card-body">
          <h5 class="card-title fw-bold">Interstellar</h5>
          <p class="card-text text-muted small">Sci-Fi • 2014</p>
          <p class="text-warning mb-3">
            <i class="bi bi-star-fill"></i> <strong>8.6</strong>
          </p>
          <div class="d-flex justify-content-between">
            <a
              href="{{ url_for('main.review') }}"
              class="btn btn-outline-primary btn-sm px-3"
              >View</a
            >
            <button class="btn btn-danger btn-sm px-3">
              <i class="bi bi-trash"></i> Remove
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm border-0">
        <img
          src="https://picsum.photos/300/200"
          class="card-img-top"
          alt="The Dark Knight"
        />
        <div class="card-body">
          <h5 class="card-title fw-bold">The Dark Knight</h5>
          <p class="card-text text-muted small">Action • 2008</p>
          <p class="text-warning mb-3">
            <i class="bi bi-star-fill"></i> <strong>9.0</strong>
          </p>
          <div class="d-flex justify-content-between">
            <a
              href="{{ url_for('main.review') }}"
              class="btn btn-outline-primary btn-sm px-3"
              >View</a
            >
            <button class="btn btn-danger btn-sm px-3">
              <i class="bi bi-trash"></i> Remove
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
