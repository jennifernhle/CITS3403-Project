<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popcorn Journal - Forgot Password</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="../static/css/styles.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand-md shadow-sm" id="primary-nav">
        <div class="container">
          <a class="navbar-brand fw-bold" href="#">Popcorn Journal</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse mt-2 mt-md-0" id="navbarContent">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a href="login.html" class="nav-link">Sign In</a>
              </li>
              <li class="nav-item">
                <a href="register.html" class="nav-link">Register</a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">Films</a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">TV Shows</a>
              </li>
              <li class="nav-item">
                <a href="#" class="nav-link">Lists</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5">
      <div class="row justify-content-center mt-4 px-3">
        <h2 class="text-center fw-bold my-4">Forgot password?</h2>

        <div class="col-12 col-md-8 col-lg-5 col-xl-4 mt-2 px-3 p-3">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <p class="text-muted text-center mb-4">
                Enter your email address to continue resetting your password.
              </p>

              <form action="reset-password.html" method="get">
                <div class="form-group my-3">
                  <label for="mail" class="form-label">Email address</label>
                  <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                      <i class="bi bi-envelope text-secondary"></i>
                    </span>

                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      name="email"
                      aria-describedby="emailHelp"
                      placeholder="Type your email address"
                      required
                    />
                  </div>

                  <div id="emailHelp" class="form-text">
                    We'll never share your email with anyone else.
                  </div>
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-main submit-btn">
                    Reset Password
                  </button>
                </div>
              </form>
            </div>
          </div>

          <div class="text-center mt-3">
            <a href="login.html" class="btn btn-main submit-btn">Back to Login</a>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
