<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popcorn Journal - Forgot Password</title>
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  <link rel="stylesheet" href="../static/css/styles.css" />
  <link 
  rel="stylesheet" 
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  />
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Popcorn Journal</a>
      <div>
        <a class="nav-link d-inline" href="index.html">Home</a>
        <a class="nav-link d-inline" href="movie-review.html">Movie Review</a>
        <a class="nav-link d-inline" href="profile.html">Profile</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h3 fw-bold mb-3 text-center">Forgot Password</h1>
            <p class="text-muted text-center mb-4">
              Enter your email address to continue resetting your password.
            </p>

            <form>
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
              </div>

              <div class="d-grid mb-3">
                <a href="reset-password.html" class="btn btn-main submit-btn">Reset Password</a>
              </div>
            </form>
          </div>
        </div>

        <div class="text-center mt-3">
          <a href="login.html" class="btn btn-main submit-btn">Back to Login</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
