<!--Search page用来找电影和添加-->
<!--Search page used to search movies and add it-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Movies</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 统一CSS -->
    <!--standardize CSS-->
    <link rel="stylesheet" href="../../static/css/styles.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-md shadow-sm bg-white">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Popcorn Journal</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Search</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Watchlist</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Profile</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 主内容 -->
 <!--Main content-->
<div class="container py-5">

  <!-- 搜索区域 -->
  <!--Search section-->
  <div class="text-center mb-5">

    <h1 class="fw-bold">Search Movies</h1>
    <p class="text-muted">Find and explore your favourite films</p>

    <!-- ⭐ 标准搜索框 -->
     <!--standard search box-->
    <div class="search-box mt-4">
      <div class="input-group shadow-sm">
        <input 
          type="text" 
          class="form-control" 
          placeholder="Search for movies..."
        >
        <button class="btn btn-primary px-4">
          Search
        </button>
      </div>
    </div>

  </div>

  <!-- 卡片 -->
  <!-- Cards-->
  <div class="row g-4">

    <!-- Card1 -->
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        
        <div class="card-body">
          <h5 class="card-title">Inception</h5>
          <p class="card-text text-muted">Sci-Fi • 2010</p>

          <p class="text-warning mb-2">⭐ <strong>8.8</strong></p>

          <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-primary btn-sm">+ Watchlist</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Card2 -->
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        
        <div class="card-body">
          <h5 class="card-title">Interstellar</h5>
          <p class="card-text text-muted">Sci-Fi • 2014</p>

          <p class="text-warning mb-2">⭐ <strong>8.6</strong></p>

          <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-primary btn-sm">+ Watchlist</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Card3 -->
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        
        <div class="card-body">
          <h5 class="card-title">The Dark Knight</h5>
          <p class="card-text text-muted">Action • 2008</p>

          <p class="text-warning mb-2">⭐ <strong>9.0</strong></p>

          <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-primary btn-sm">+ Watchlist</button>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
