{% extends "base.html" %} {% block title %}Search - Popcorn Journal{% endblock
%} {% block content %}
<div class="container">
  <div class="row justify-content-center text-center mt-4">
    <div class="col-md-8">
      <h2 class="fw-bold" id="title">Search Movies</h2>
      <p class="text-secondary">Find and explore your favourite films.</p>
    </div>
  </div>

  <div class="row justify-content-center mb-5">
    <div class="col-12 col-md-10 col-lg-8 col-xl-7">
      <div id="login-card" class="p-4 shadow-sm">
        <form
          action="{{ url_for('main.search') }}"
          method="GET"
          class="search-form"
        >
          <div class="form-group">
            <label for="movie-search" class="form-label">Movie title</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-secondary"></i>
              </span>
              <input
                type="text"
                class="form-control border-start-0"
                id="movie-search"
                name="query"
                placeholder="Type a movie title..."
                required
              />
              <button type="submit" class="btn btn-main submit-btn px-4">
                Search
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <h4 class="mb-4 fw-bold">Results</h4>
  <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
    <div class="col">
      <div class="card h-100 shadow-sm border-0">
        <img
          src="https://picsum.photos/300/450"
          class="card-img-top"
          alt="Movie Title"
          style="height: 300px; object-fit: cover"
        />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold mb-1">Inception</h5>
          <p class="card-text text-muted small mb-2">Sci-Fi • 2010</p>
          <p class="text-warning mb-3">
            <i class="bi bi-star-fill"></i> <strong>8.8</strong>
          </p>
          <div
            class="d-flex justify-content-between align-items-center mt-auto"
          >
            <a
              href="{{ url_for('main.review', movie_id=1) }}"
              class="btn btn-outline-secondary btn-sm px-3"
              >View</a
            >
            <button class="btn btn-main btn-sm">+ Watchlist</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
