<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/styles.css">
    <style>
        body {
            background-color: var(--bg-color);
        }

        .card {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
<input class="form-control mb-4" placeholder="Search for movies...">

<div class="container mt-5">

  <h1 class="mb-4">Search Movies</h1>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Inception</h5>
          <p class="card-text">Sci-Fi • 2010</p>
          <button class="btn btn-primary">View</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Interstellar</h5>
          <p class="card-text">Sci-Fi • 2014</p>
          <button class="btn btn-primary">View</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">The Dark Knight</h5>
          <p class="card-text">Action • 2008</p>
          <button class="btn btn-primary">View</button>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
