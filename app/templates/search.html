<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/styles.css">
    <style>
        body {
            background-color: var(--bg-color);
            font-family:'Segoe UI',sans-serif;
        }

        .card {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        .card:hover{
          transform: translateY(-5px) scale(1.05);
        }
        .card-img-top{
          height: 200px;
          object-fit: cover;
        }
    </style>
</head>
<body>
  <!--搜索框-->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark px-4">
  <a class="navbar-brand" href="#">Popcorn Journal</a>

  <div class="ms-auto">
    <a class="nav-link d-inline text-white" href="#">Search</a>
    <a class="nav-link d-inline text-white" href="#">Watchlist</a>
    <a class="nav-link d-inline text-white" href="#">Profile</a>
  </div>
</nav>


<div class="container mt-5">
  <!-- 搜索区域 -->
<div class="text-center my-5">

  <!-- 标题 -->
  <h1 class="fw-bold">Search Movies</h1>

  <!-- 副标题 -->
  <p class="text-muted">Find and explore your favourite films</p>

  <!-- 搜索框 -->
  <div class="d-flex justify-content-center mt-4">
    <input 
      type="text" 
      class="form-control w-50 me-2" 
      placeholder="Search for movies..."
    >

    <button class="btn btn-primary btn-sm">
      Search
    </button>
  </div>

</div>
  
  <!--卡片-->
  <div class="row g-4">

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        
        <div class="card-body">
          <h5 class="card-title">Inception</h5>
            <p class="card-text">Sci-Fi • 2010</p>

            <p class="text-warning mb-2">⭐ 8.8</p>

            <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-primary btn-sm">+ Watchlist</button>
            </div>
        </div>
      
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        
        <div class="card-body">
          <h5 class="card-title">Inception</h5>
            <p class="card-text">Sci-Fi • 2010</p>

            <p class="text-warning mb-2">⭐ 8.8</p>

            <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-primary btn-sm">+ Watchlist</button>
            </div>
        </div>
      
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <img src="https://picsum.photos/300/200" class="card-img-top">
        
        <div class="card-body">
          <h5 class="card-title">The Dark Knight</h5>
            <p class="card-text">Action • 2008</p>

            <p class="text-warning mb-2">⭐ 9.0</p>

            <div class="d-flex justify-content-between">
            <button class="btn btn-outline-primary btn-sm">View</button>
            <button class="btn btn-primary btn-sm">+ Watchlist</button>
            </div>
        </div>
      
      </div>
    </div>

  </div>

</div>

</body>
</html>
