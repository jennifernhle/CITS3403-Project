{% extends "base.html" %} {% block title %}Login - Popcorn Journal{% endblock %}
{% block content %}

<div class="container">
  <div class="row justify-content-md-center mt-4 px-3" id="login">
    <h2 class="text-center fw-bold my-4" id="title">Welcome back!</h2>
    <div
      class="col-12 col-md-8 col-lg-5 col-xl-4 mt-2 px-3 p-3"
      id="login-card"
    >
      <form
        class="login-form"
        id="login-form"
        action=""
        accept-charset="UTF-8"
        method="post"
      >
        <div class="form-group my-3">
          <label for="login-email" class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-envelope text-secondary"> </i>
            </span>
            <input
              type="email"
              class="form-control"
              id="login-email"
              aria-describedby="emailHelp"
              placeholder="Type your email address"
              required
            />
          </div>
          <div id="emailHelp" class="form-text small">
            We'll never share your email with anyone else.
          </div>
        </div>

        <div class="form-group my-3">
          <label for="login-password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-lock text-secondary"></i>
            </span>
            <input
              type="password"
              class="form-control"
              id="login-password"
              placeholder="Type your password"
              required
            />
            <span
              class="input-group-text bg-white toggle-password cursor-pointer"
            >
              <i class="bi bi-eye-slash"></i>
            </span>
          </div>
        </div>

        <div class="d-flex justify-content-between mb-3 align-items-center">
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              id="remember-me"
              value=""
            />
            <label
              class="form-check-label small text-secondary"
              for="remember-me"
              >Remember me</label
            >
          </div>
          <a
            href="{{ url_for('main.forgot_password') }}"
            class="small text-decoration-none"
            >Forgot password?</a
          >
        </div>

        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-main submit-btn" id="submitBtn">
            LOGIN
          </button>
        </div>

        <div class="text-center mt-4">
          <p class="small text-secondary mb-3">
            Don't have an account?
            <a
              href="{{ url_for('main.register') }}"
              class="text-decoration-none"
              >Register now</a
            >
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
