<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Popcorn Journal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../static/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <!-- Navigation -->
      <nav class="navbar navbar-expand-md shadow-sm" id="primary-nav">
        <div class="container">
          <a class="navbar-brand fw-bold" href="">Popcorn Journal</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse mt-2 mt-md-0" id="navbarContent">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a href="" class="nav-link">Sign In</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">Register</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">Films</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">TV Shows</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">Lists</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <div class="container">
      <div class="row justify-content-md-center mt-4 px-3" id="login">
        <h2 class="text-center fw-bold my-4" id="title">Welcome back!</h2>
        <div
          class="col-12 col-md-8 col-lg-5 col-xl-4 mt-2 px-3 p-3"
          id="login-card"
        >
          <form
            class="login-form"
            id="login-form"
            action=""
            accept-charset="UTF-8"
            method="post"
          >
            <!-- Email login -->
            <div class="form-group my-3">
              <label for="login-email" class="form-label">Email address</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-envelope text-secondary"> </i>
                </span>
                <input
                  type="email"
                  class="form-control"
                  id="login-email"
                  aria-describedby="emailHelp"
                  placeholder="Type your email address"
                  required
                />
              </div>
              <div id="emailHelp" class="form-text">
                We'll never share your email with anyone else.
              </div>
            </div>

            <!-- Password login -->
            <div class="form-group my-3">
              <label for="login-password" class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-lock text-secondary"></i>
                </span>
                <input
                  type="password"
                  class="form-control"
                  id="login-password"
                  placeholder="Type your password"
                  required
                />
                <span class="input-group-text bg-white toggle-password">
                  <i class="bi bi-eye-slash"></i>
                </span>
              </div>
            </div>

            <!-- Remember me + Forgot password? -->
            <div class="d-flex justify-content-between mb-3 align-items-center">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="remember-me"
                  value=""
                />
                <label
                  class="form-check-label small text-secondary"
                  for="remember-me"
                  >Remember me</label
                >
              </div>
              <a href="" class="small text-decoration-none">Forgot password?</a>
            </div>

            <!-- Sign in button -->
            <div class="d-grid gap-2 mt-4">
              <button
                type="submit"
                class="btn btn-main submit-btn"
                id="submitBtn"
              >
                LOGIN
              </button>
            </div>

            <!-- Don't have an account? -->
            <div class="text-center mt-4">
              <p class="small text-secondary mb-3">
                Don't have an account?
                <a href="register.html" class="text-decoration-none"
                  >Register now</a
                >
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="custom-footer py-5 mt-5">
      <div class="container text-center">
        <div class="d-flex justify-content-center gap-3 mb-3">
          <a href="" class="text-decoration-none">About</a>
          <a href="" class="text-decoration-none">Contact</a>
          <a href="" class="text-decoration-none">Terms</a>
          <a href="" class="text-decoration-none">Privacy</a>
        </div>
        <p class="small text-secondary mb-0">&copy; Popcorn Journal</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../static/js/auth.js"></script>
  </body>
</html>
