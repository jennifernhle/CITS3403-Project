{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container">

  <!-- Title -->
  <div class="row justify-content-center text-center mt-4">
    <div class="col-md-8">
      <h2 class="fw-bold">Search Movies</h2>
      <p class="text-secondary">Find and explore your favourite films.</p>
    </div>
  </div>

  <!-- Search box -->
  <div class="row justify-content-center mb-5">
    <div class="col-12 col-md-10 col-lg-8 col-xl-7">
      <div id="login-card" class="p-4 shadow-sm">
        <form action="{{ url_for('main.search') }}" method="GET">
          <label for="movie-search" class="form-label">Movie title</label>
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              id="movie-search"
              name="query"
              placeholder="Type a movie title..."
              required
            />
            <button type="submit" class="btn btn-main px-4">
              Search
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Results -->
<h4 class="mb-4 fw-bold">Results</h4>
  <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">

  {% for movie in movies %}
  <div class="col">
    <div class="card h-100 shadow-sm">

      <!-- picture -->
      <img src="{{ movie.poster or 'https://picsum.photos/300/450' }}"
     class="card-img-top"
     style="height: 300px; object-fit: cover;"
     alt="{{ movie.title }}">

      <div class="card-body d-flex flex-column">

        <!-- 标题 -->
        <h5 class="card-title fw-bold">{{ movie.title }}</h5>

        <!-- 类型/年份（可选） -->
        <p class="card-text text-muted small">
          {{ movie.genre }} • {{ movie.year }}
        </p>

        <div class="mt-auto d-flex justify-content-between">

          <!-- 🔥 查看详情 -->
        <a href="{{ url_for('main.movie_detail', movie_id=movie.id) }}" 
          class="btn btn-outline-secondary btn-sm">
            View
        </a>

          <!-- 🔥 加入watchlist -->
          <button class="btn btn-main btn-sm add-btn" 
                  data-title="{{ movie.title }}">
            + Watchlist
          </button>

        </div>
      </div>
    </div>
  </div>
  {% endfor %}

</div>

</div>

<!--js-->
<script>
document.querySelectorAll(".add-btn").forEach(button => {

  const title = button.dataset.title;

  // 页面加载检查
  let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

  if (watchlist.includes(title)) {
    button.textContent = "✓ Added";
    button.disabled = true;
  }

  // 点击事件
  button.addEventListener("click", function () {

    let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

    if (!watchlist.includes(title)) {
      watchlist.push(title);
      localStorage.setItem("watchlist", JSON.stringify(watchlist));

      this.textContent = "✓ Added";
      this.disabled = true;
    }
  });
});
</script>

{% endblock %}
