{% extends "base.html" %} {% block title %}{{ title }}{% endblock %} {% block content %}
<div class="container">
  <!-- Title -->
  <div class="row justify-content-center text-center mt-4">
    <div class="col-md-8">
      <h2 class="fw-bold">Search Movies</h2>
      <p class="text-secondary">Find and explore your favourite films.</p>
    </div>
  </div>

  <!-- Search box -->
  <div class="row justify-content-center mb-5">
    <div class="col-12 col-md-10 col-lg-8 col-xl-7">
      <div id="login-card" class="p-4 shadow-sm">
        <form action="{{ url_for('main.search') }}" method="GET">
          <div class="row g-3">
            <!-- Text Search -->
            <div class="col-md-7">
              <label for="movie-search" class="form-label">Search Title or Director</label>
              <input type="text" class="form-control" id="movie-search" name="query" 
                     placeholder="Type here..." value="{{ request.args.get('query', '') }}">
            </div>

            <div class="col-md-5">
              <label for="genre-filter" class="form-label">Genre</label>
              <select name="genre" id="genre-filter" class="form-select">
                <option value="">All Genres</option>
                {% for val, label in form.genre.choices %}
                  {% if val != '' %}
                    <option value="{{ val }}" {% if request.args.get('genre') == val %}selected{% endif %}>
                      {{ label }}
                    </option>
                  {% endif %}
                {% endfor %}
              </select>
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-main w-100 mt-2">Apply Filters</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Results -->
  <h4 class="mb-4 fw-bold">Results</h4>
  <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
    {% for movie in results %}
    <div class="col">
      <div class="card h-100 shadow-sm">
        <!-- picture -->
        <img
          src="{{ url_for('static', filename='posters/' + movie.movie_img) if movie.movie_img else 'https://picsum.photos/400/600' }}"
          class="card-img-top"
          style="height: 300px; object-fit: cover"
          alt="{{ movie.title }}"
        />

        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold">{{ movie.title }}</h5>

          <p class="card-text text-muted small">{{ movie.genre or 'General' }} • {{ movie.release_year }}</p>

          <div class="mt-auto d-flex justify-content-between">
            <a href="{{ url_for('main.movie_detail', movie_id=movie.id) }}" class="btn btn-outline-secondary btn-sm"> View </a>

            <button
              class="btn btn-main btn-sm add-btn"
              data-movie-id="{{ movie.id }}"
              {%
              if
              current_user.is_authenticated
              and
              movie
              in
              current_user.watchlist
              %}
              disabled
              {%
              endif
              %}
            >
              {% if current_user.is_authenticated and movie in current_user.watchlist %} ✓ Added {% else %} + Watchlist {% endif %}
            </button>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<!--js-->
<script>
  document.querySelectorAll(".add-btn").forEach((button) => {
    button.addEventListener("click", function () {
      const movieId = this.dataset.movieId;

      fetch(`/watchlist/toggle/${movieId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
      })
        .then((response) => response.json())
        .then((data) => {
          if (data.success) {
            this.textContent = "✓ Added";
            this.classList.replace("btn-main", "btn-success");
            this.disabled = true;
          }
        })
        .catch((error) => console.error("Error:", error));
    });
  });
</script>

{% endblock %}
