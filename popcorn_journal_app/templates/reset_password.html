{% extends "base.html" %} {% block content %}

<div class="container py-5">
  <div class="row justify-content-center mt-4 px-3">
    <h2 class="text-center fw-bold my-4">Reset Password</h2>

    <div class="col-12 col-md-8 col-lg-5 col-xl-4 mt-2 px-3 p-3">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <p class="text-muted text-center mb-4">
            Enter your email address and create a new password.
          </p>

          <form action="" method="post">
            <div class="form-group my-3">
              <label for="email" class="form-label">Email address</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-envelope text-secondary"></i>
                </span>
                <input
                  type="email"
                  class="form-control border-start-0"
                  id="email"
                  name="email"
                  placeholder="Type your email address"
                  required
                />
              </div>
            </div>

            <div class="form-group my-3">
              <label for="new-password" class="form-label">New Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-lock text-secondary"></i>
                </span>
                <input
                  type="password"
                  class="form-control border-start-0"
                  id="new-password"
                  name="new-password"
                  placeholder="Type your new password"
                  required
                />
              </div>
            </div>

            <div class="form-group my-3">
              <label for="confirm-password" class="form-label">
                Confirm New Password
              </label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-lock text-secondary"></i>
                </span>
                <input
                  type="password"
                  class="form-control border-start-0"
                  id="confirm-password"
                  name="confirm-password"
                  placeholder="Re-enter your new password"
                  required
                />
              </div>
            </div>

            <div class="d-grid mb-3 mt-4">
              <button type="submit" class="btn btn-main submit-btn">
                Reset Password
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="text-center mt-3">
        <a
          href="{{ url_for('main.login') }}"
          class="btn btn-main submit-btn text-decoration-none small"
        >
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
