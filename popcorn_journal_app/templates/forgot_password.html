{% extends "base.html" %} 
{% block title %}{{title}}{% endblock %} 
{%block content %}

<div class="container py-5">
  <div class="row justify-content-center mt-4 px-3">
    <h2 class="text-center fw-bold my-2">Forgot password?</h2>
    <p class="text-secondary text-center mt-2">
      Enter your email address to reset your password.
    </p>
    <div class="col-12 col-md-8 col-lg-5 col-xl-4 px-3 p-3">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form action="{{ url_for('main.reset_password') }}" method="POST">
            <div class="form-group my-3">
              <label for="email" class="form-label">Email address</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-envelope text-secondary"></i>
                </span>

                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  placeholder="Type your email address"
                  required
                />
              </div>
            </div>

            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-main submit-btn">
                Reset Password
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="text-center mt-3">
        <a
          href="{{ url_for('main.login') }}"
          class="btn btn-main submit-btn text-decoration-none small"
          ><i class="bi bi-arrow-left me-2"></i>Back to Login</a
        >
      </div>
    </div>
  </div>
</div>
{% endblock %}
