<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popcorn Journal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-md shadow-sm" id="primary-nav">
        <div class="container">
          <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}"
            ><img
              src="{{ url_for('static', filename='img/logo.png') }}"
              alt="Popcorn Journal Logo"
              height="30"
              class="me-2"
            />
            Popcorn Journal</a
          >

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a href="{{ url_for('main.search')}}" class="nav-link">Films</a>
              </li>
              <li class="nav-item">
                <a href="{{ url_for('main.watchlist') }}" class="nav-link"
                  >Watchlist</a
                >
              </li>
              <li class="nav-item">
                <a href="{{ url_for('main.lists') }}" class="nav-link">Lists</a>
              </li>
            </ul>

            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a href="{{ url_for('main.login') }}" class="nav-link"
                  >Sign In</a
                >
              </li>
              <li class="nav-item">
                <a href="{{ url_for('main.register') }}" class="nav-link"
                  >Register</a
                >
              </li>
              <li class="nav-item dropdown">
                <a
                  href="#"
                  class="nav-link dropdown-toggle d-flex align-items-center"
                  id="profileDropdown"
                  data-bs-toggle="dropdown"
                  ><i class="bi bi-person-circle me-1"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <a
                      href="{{ url_for('main.profile') }}"
                      class="dropdown-item"
                      >My Profile</a
                    >
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a
                      href="{{ url_for('main.logout') }}"
                      class="dropdown-item text-danger"
                      >Logout</a
                    >
                  </li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mt-4">{% block content %} {% endblock %}</main>

    <!-- Footer -->
    <footer class="custom-footer py-5 mt-5 border-top">
      <div class="container text-center">
        <div class="d-flex justify-content-center gap-3 mb-3">
          <a
            href="{{ url_for('main.about_us') }}"
            class="text-decoration-none text-secondary"
            >About</a
          >
        </div>
        <p class="small text-secondary mb-0">&copy; 2026 Popcorn Journal</p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
