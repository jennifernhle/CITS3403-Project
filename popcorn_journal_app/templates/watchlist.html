{% extends "base.html" %}

{% block title %}Watchlist - Popcorn Journal{% endblock %}

{% block content %}

<div class="container">
  <h2 class="text-center fw-bold my-4">My Watchlist</h2>
  <p class="text-secondary text-center">Movies you are planning to watch.</p>

  <div id="watchlist-results" class="row g-4"></div>
</div>

<script>
const container = document.getElementById("watchlist-results");

// create card
function addMovie(title) {
  const col = document.createElement("div");
  col.className = "col-md-6 col-lg-4";

  col.innerHTML = `
    <div class="card h-100 shadow-sm">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title fw-bold">${title}</h5>

        <div class="mt-auto text-end">
          <button class="btn btn-danger btn-sm remove-btn">Remove</button>
        </div>
      </div>
    </div>
  `;

  // function delete
  col.querySelector(".remove-btn").addEventListener("click", function () {
    let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

    watchlist = watchlist.filter(movie => movie !== title);

    localStorage.setItem("watchlist", JSON.stringify(watchlist));

    col.remove();
  });

  container.appendChild(col);
}

// read data
const watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

// display
watchlist.forEach(title => addMovie(title));
</script>

{% endblock %}
