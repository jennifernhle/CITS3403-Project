{% extends "base.html" %} {% block title %} {{title}} {% endblock %} {% block content %}

<div class="container">
  <h2 class="text-center fw-bold my-4">My Watchlist</h2>
  <p class="text-secondary text-center">Movies you are planning to watch.</p>

  <div id="watchlist-results" class="row g-4">
    {% for movie in movies %}
    <div class="col-md-6 col-lg-4" id="movie-card-{{ movie.id }}">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold">{{ movie.title }}</h5>
          <p class="text-muted small">{{ movie.release_year }}</p>
          <div class="mt-auto text-end">
            <button class="btn btn-danger btn-sm remove-btn" onclick="removeMovie('{{ movie.id }}')">Remove</button>
          </div>
        </div>
      </div>
    </div>
    {% else %}
    <p class="text-center">Your watchlist is empty.</p>
    {% endfor %}
  </div>

  <script>
    function removeMovie(movieId) {
      fetch(`/watchlist/toggle/${movieId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
      })
        .then((response) => response.json())
        .then((data) => {
          if (data.success && data.action === "removed") {
            document.getElementById(`movie-card-${movieId}`).remove();
          }
        });
    }
  </script>
</div>

{% endblock %}
